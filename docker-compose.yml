
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads-data:/app/apps/api/uploads
    depends_on:
      - redis
    ports:
      - '4000:4000'

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    restart: unless-stopped
    ports:
      - '5173:80'

volumes:
  redis-data:
  # Property images live on disk (claude_plan.md §2/§11) - this volume is what makes them
  # survive a container rebuild. Back this up separately; it is not covered by any Mongo backup.
  uploads-data:
