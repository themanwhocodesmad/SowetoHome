# Production deploy config for the droplet - see DEPLOY.md for the full runbook.
# Local development runs the apps directly (`npm run dev`); this file is not needed for it.
# Only Caddy publishes ports: api/web/redis are reachable solely on the compose network,
# and Caddy terminates HTTPS for ${DOMAIN} with an automatic Let's Encrypt certificate.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        'redis-server',
        '--requirepass',
        '${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}',
        '--appendonly',
        'yes',
      ]
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CLIENT_URL: https://${DOMAIN:?set DOMAIN in .env}
      API_PUBLIC_URL: https://${DOMAIN}
    volumes:
      - uploads-data:/app/apps/api/uploads
    depends_on:
      - redis
    expose:
      - '4000'

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Empty = same-origin: the browser talks to /api on ${DOMAIN} and Caddy routes it.
        VITE_API_URL: ''
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID in .env}
    restart: unless-stopped
    expose:
      - '80'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # caddy-data holds the Let's Encrypt certificates - deleting it forces reissue and
      # can hit LE rate limits, so keep it across rebuilds.
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web

volumes:
  redis-data:
  caddy-data:
  caddy-config:
  # Property images live on disk (claude_plan.md §2/§11) - this volume is what makes them
  # survive a container rebuild. Back this up separately; it is not covered by any Mongo backup.
  uploads-data:
