server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path not matching a static file goes to index.html so
    # React Router can handle client-side routes like /properties/:id directly.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
